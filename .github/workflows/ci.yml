# ط¯ط±ظˆط¨ Droob â€” CI Pipeline
# Lint + Typecheck + Test on every push to main & PRs
# â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ

name: CI â€” Lint, Typecheck & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # â”€â”€â”€â”€ Backend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  backend:
    name: Backend (Fastify)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: droob_test
          POSTGRES_USER: droob
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm -w backend run typecheck

      - name: Lint
        run: npm -w backend run lint

      - name: Run migrations
        run: |
          echo "DATABASE_URL=postgresql://droob:test_password@localhost:5432/droob_test" > backend/.env
          npx drizzle-kit push --config backend/drizzle.config.ts
        continue-on-error: false

      - name: Run tests
        run: npm -w backend run test
        env:
          DATABASE_URL: postgresql://droob:test_password@localhost:5432/droob_test
          REDIS_URL: redis://localhost:6379

  # â”€â”€â”€â”€ Dashboard â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  dashboard:
    name: Dashboard (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm -w dashboard run typecheck

      - name: Lint
        run: npm -w dashboard run lint

      - name: Run tests
        run: npm -w dashboard run test

      - name: Build check (no deploy)
        run: npm -w dashboard run build

  # ─── Mobile (React Native / Expo) ────────────────────────────────────────
  mobile:
    name: Mobile (Expo / React Native)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck
        working-directory: mobile
        run: npm run typecheck

      - name: Lint
        working-directory: mobile
        run: npm run lint

      - name: Run tests
        working-directory: mobile
        run: npm run test
