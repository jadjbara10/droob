app = "droob-api"
primary_region = "ams"

[env]
  NODE_ENV = "production"
  # ═══ SECRETS — Managed via `fly secrets set`, NEVER hardcoded ═══
  # DATABASE_URL  → fly secrets set DATABASE_URL=...
  # REDIS_URL     → fly secrets set REDIS_URL=...
  # JWT_SECRET    → fly secrets set JWT_SECRET=...
  # SMTP_PASS     → fly secrets set SMTP_PASS=...
  # ═══════════════════════════════════════════════════════════════
  CORS_ORIGIN = "https://droob-jo.com,https://admin.droob-jo.com,https://app.droob-jo.com"
  RATE_LIMIT_MAX = "100"
  DEFAULT_LANGUAGE = "ar"
  TIMEZONE = "Asia/Amman"
  CURRENCY = "JOD"
  FRIDAY_PRAYER_GAP_START = "11:30"
  FRIDAY_PRAYER_GAP_END = "13:30"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
