<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- دروب App Icon — Brand Blue Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A4F8A"/>
      <stop offset="100%" stop-color="#0F2B4C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- Transit Route Symbol — abstract path with circle markers -->
  <!-- Circle stops along a stylized route path -->
  <circle cx="280" cy="360" r="48" fill="#C9A84C" opacity="0.9"/>
  <circle cx="480" cy="280" r="40" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="660" cy="440" r="36" fill="#C9A84C" opacity="0.85"/>
  <circle cx="520" cy="620" r="44" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="740" cy="520" r="32" fill="#FFFFFF" opacity="0.7"/>

  <!-- Connecting route lines -->
  <line x1="280" y1="360" x2="480" y2="280" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="480" y1="280" x2="660" y2="440" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="660" y1="440" x2="520" y2="620" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="520" y1="620" x2="740" y2="520" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.5"/>

  <!-- Bus icon silhouette (centered) -->
  <g transform="translate(620, 440)" opacity="0.95">
    <!-- Bus body simplified -->
    <rect x="-60" y="-30" width="120" height="60" rx="16" fill="#FFFFFF"/>
    <!-- Windows -->
    <rect x="-44" y="-20" width="36" height="18" rx="4" fill="#1A4F8A"/>
    <rect x="-2" y="-20" width="36" height="18" rx="4" fill="#1A4F8A"/>
    <!-- Wheels -->
    <circle cx="-30" cy="34" r="10" fill="#0F2B4C"/>
    <circle cx="30" cy="34" r="10" fill="#0F2B4C"/>
    <!-- Headlight -->
    <rect x="50" y="-14" width="8" height="12" rx="3" fill="#C9A84C"/>
  </g>

  <!-- دروب Wordmark — Arabic calligraphy style -->
  <text x="512" y="850" text-anchor="middle" font-family="IBM Plex Sans Arabic, Arial" font-weight="700" font-size="180" fill="#FFFFFF" letter-spacing="-4">دروب</text>

  <!-- Subtle gold accent line under wordmark -->
  <line x1="380" y1="880" x2="644" y2="880" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

  <!-- Small English subtitle -->
  <text x="512" y="930" text-anchor="middle" font-family="IBM Plex Sans, Arial" font-weight="500" font-size="40" fill="#FFFFFF" opacity="0.7" letter-spacing="8">DROOB</text>
</svg>
