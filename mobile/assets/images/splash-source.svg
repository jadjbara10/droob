<svg width="1284" height="2778" viewBox="0 0 1284 2778" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Splash Screen — Brand Blue Background + Centered Logo + Tagline -->
  <rect width="1284" height="2778" fill="#1A4F8A"/>

  <!-- Animated route paths (abstract transit lines) -->
  <g opacity="0.15">
    <path d="M-100 800 Q300 400 600 700 Q900 1000 1400 600" stroke="#FFFFFF" stroke-width="3" fill="none"/>
    <path d="M-100 1200 Q400 1500 700 1000 Q1000 500 1400 900" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <path d="M-100 1800 Q500 1400 800 1800 Q1100 2200 1400 1500" stroke="#FFFFFF" stroke-width="3" fill="none"/>
  </g>

  <!-- Circle stops along paths -->
  <g opacity="0.3">
    <circle cx="300" cy="550" r="12" fill="#C9A84C"/>
    <circle cx="600" cy="700" r="10" fill="#FFFFFF"/>
    <circle cx="400" cy="1200" r="8" fill="#C9A84C"/>
    <circle cx="700" cy="1000" r="14" fill="#FFFFFF"/>
    <circle cx="500" cy="1700" r="10" fill="#C9A84C"/>
  </g>

  <!-- Central logo area -->
  <g transform="translate(642, 1000)">
    <!-- Transit circles -->
    <circle cx="-160" cy="-80" r="48" fill="#C9A84C" opacity="0.9"/>
    <circle cx="80" cy="-140" r="40" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="200" cy="20" r="36" fill="#C9A84C" opacity="0.85"/>
    <circle cx="0" cy="140" r="44" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="260" cy="100" r="30" fill="#FFFFFF" opacity="0.7"/>

    <!-- Route connections -->
    <line x1="-160" y1="-80" x2="80" y2="-140" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="80" y1="-140" x2="200" y2="20" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="200" y1="20" x2="0" y2="140" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="140" x2="260" y2="100" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.5"/>

    <!-- Bus icon centered -->
    <rect x="60" y="20" width="140" height="72" rx="20" fill="#FFFFFF"/>
    <rect x="78" y="32" width="42" height="24" rx="5" fill="#1A4F8A"/>
    <rect x="128" y="32" width="42" height="24" rx="5" fill="#1A4F8A"/>
    <circle cx="98" cy="96" r="12" fill="#0F2B4C"/>
    <circle cx="162" cy="96" r="12" fill="#0F2B4C"/>
    <rect x="188" y="36" width="10" height="16" rx="4" fill="#C9A84C"/>
  </g>

  <!-- دروب Wordmark -->
  <text x="642" y="1350" text-anchor="middle" font-family="IBM Plex Sans Arabic, Arial" font-weight="700" font-size="220" fill="#FFFFFF">دروب</text>

  <!-- Gold accent line -->
  <line x1="440" y1="1390" x2="844" y2="1390" stroke="#C9A84C" stroke-width="6" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="642" y="1480" text-anchor="middle" font-family="IBM Plex Sans Arabic, Arial" font-weight="500" font-size="52" fill="#FFFFFF" opacity="0.85">طرقك في الأردن، أسهل وأذكى</text>

  <!-- English subtitle -->
  <text x="642" y="1550" text-anchor="middle" font-family="IBM Plex Sans, Arial" font-weight="400" font-size="36" fill="#FFFFFF" opacity="0.6" letter-spacing="12">YOUR PATHS IN JORDAN, SMARTER AND EASIER</text>

  <!-- Version -->
  <text x="642" y="2400" text-anchor="middle" font-family="IBM Plex Sans, Arial" font-weight="400" font-size="28" fill="#FFFFFF" opacity="0.4">v1.0.0</text>
</svg>
