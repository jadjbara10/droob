<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Adaptive Icon Foreground — دروب logo centered with 20% padding -->
  <g transform="translate(512, 470)">
    <!-- Transit circles -->
    <circle cx="-120" cy="-60" r="32" fill="#C9A84C"/>
    <circle cx="60" cy="-100" r="26" fill="#FFFFFF"/>
    <circle cx="140" cy="20" r="24" fill="#C9A84C"/>
    <circle cx="0" cy="100" r="30" fill="#FFFFFF"/>

    <!-- Route lines -->
    <line x1="-120" y1="-60" x2="60" y2="-100" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="60" y1="-100" x2="140" y2="20" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="140" y1="20" x2="0" y2="100" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

    <!-- Bus icon -->
    <rect x="0" y="20" width="80" height="44" rx="12" fill="#FFFFFF"/>
    <rect x="10" y="28" width="24" height="14" rx="3" fill="#1A4F8A"/>
    <rect x="38" y="28" width="24" height="14" rx="3" fill="#1A4F8A"/>
    <circle cx="20" cy="68" r="7" fill="#1A4F8A"/>
    <circle cx="60" cy="68" r="7" fill="#1A4F8A"/>
  </g>

  <!-- دروب text -->
  <text x="512" y="800" text-anchor="middle" font-family="IBM Plex Sans Arabic, Arial" font-weight="700" font-size="160" fill="#FFFFFF">دروب</text>

  <line x1="380" y1="830" x2="644" y2="830" stroke="#C9A84C" stroke-width="5" stroke-linecap="round"/>
  <text x="512" y="880" text-anchor="middle" font-family="IBM Plex Sans, Arial" font-weight="500" font-size="36" fill="#FFFFFF" opacity="0.7" letter-spacing="6">DROOB</text>
</svg>
