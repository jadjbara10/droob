# ═══════════════════════════════════════════════════════
# دروب Droob — Docker Compose PRODUCTION
# Deployed via Railway / VPS
#
# Differences from dev:
#   ❌ No bind mounts (no source code volumes)
#   ❌ No dev tools (pgadmin, redis-commander)
#   ❌ No debug ports exposed
#   ✅ Healthchecks with proper intervals
#   ✅ Restart always
#   ✅ Resource limits
#   ✅ External secrets (from environment)
# ═══════════════════════════════════════════════════════

services:
  # ──── PostgreSQL 16 + PostGIS 3.4 ────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: droob-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-droob}
      POSTGRES_USER: ${POSTGRES_USER:-droob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-droob} -d ${POSTGRES_DB:-droob}"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - droob-network

  # ──── Redis 7 ────
  redis:
    image: redis:7-alpine
    container_name: droob-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --save 900 1
      --save 300 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - droob-network

  # ──── Backend API (Fastify + Socket.io) ────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_ENV: production
        BUILDKIT_INLINE_CACHE: "1"
    container_name: droob-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-droob}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-droob}
      REDIS_URL: redis://:${REDIS_PASSWORD:?err - REDIS_PASSWORD required for production}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      GAM_GTFS_URL: ${GAM_GTFS_URL:-https://gtfs.gam.gov.jo/feed.zip}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.droob.app}
      DEFAULT_LANGUAGE: ar
      TIMEZONE: Asia/Amman
      CURRENCY: JOD
      FRIDAY_PRAYER_GAP_START: "11:30"
      FRIDAY_PRAYER_GAP_END: "13:30"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - droob-network

  # ──── Dashboard (Next.js with Analytics) ────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: droob-dashboard-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-droob}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-droob}
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - droob-network

  # ──── Database Backup Cron ────
  db-backup:
    image: postgis/postgis:16-3.4
    container_name: droob-db-backup
    restart: always
    entrypoint: |
      /bin/sh -c '
      while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        BACKUP_FILE="/backups/droob_$$TIMESTAMP.sql.gz";
        echo "Starting backup: $$BACKUP_FILE";
        PGPASSWORD=$${POSTGRES_PASSWORD} pg_dump -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} --no-owner --no-acl --clean --if-exists | gzip > $$BACKUP_FILE;
        echo "Backup completed: $$BACKUP_FILE ($$(du -h $$BACKUP_FILE | cut -f1))";
        # Keep only last 7 days
        find /backups -name "*.sql.gz" -mtime +7 -delete;
        echo "Cleaned old backups. Sleeping for $$BACKUP_INTERVAL...";
        sleep $${BACKUP_INTERVAL:-86400};
      done
      '
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-droob}
      POSTGRES_USER: ${POSTGRES_USER:-droob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - droob-network
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
    name: droob-postgres-prod-data
  redis_data:
    driver: local
    name: droob-redis-prod-data
  backup_data:
    driver: local
    name: droob-backup-data

networks:
  droob-network:
    driver: bridge
    name: droob-network